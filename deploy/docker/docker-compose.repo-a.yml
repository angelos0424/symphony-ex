name: symphony-repo-a

services:
  symphony-repo-a:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    container_name: symphony-repo-a
    restart: unless-stopped
    init: true
    env_file:
      - ./env/common.env
      - ./env/repo-a.env
    environment:
      SYMPHONY_WORKFLOW_PATH: /app/workflows/repo-a.WORKFLOW.md
      SYMPHONY_DASHBOARD_ENABLED: "false"
    volumes:
      - ${SYMPHONY_SSH_DIR}:/root/.ssh:ro
      - ./workflows/repo-a.WORKFLOW.md:/app/workflows/repo-a.WORKFLOW.md:ro
      - repo_a_worktrees:/srv/symphony/repo-a/worktrees
      - repo_a_source_cache:/srv/symphony/repo-a/source-cache

volumes:
  repo_a_worktrees:
  repo_a_source_cache:
